name: Keep backend awake

# Render's free web services spin down after ~15 minutes of inactivity, which
# makes the first request (e.g. login) hang for ~50s and the app shows a
# "cannot connect to server" notice. This workflow pings the health endpoint
# every 10 minutes so the service stays warm during the day.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          URL="https://alblingo-backend.onrender.com/health"
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 30 --max-time 120 "$URL" || true)
            if [ -z "$code" ]; then code="000"; fi
            echo "Attempt $i -> HTTP $code"
            if [ "$code" = "200" ]; then
              echo "Backend is awake."
              exit 0
            fi
            sleep 30
          done
          echo "::warning::Backend did not respond with HTTP 200 after 5 attempts."
          echo "Check Render dashboard: alblingo-backend -> Logs -> Manual Deploy"
          exit 1
