name: Keep backend awake

# Render's free web services spin down after ~15 minutes of inactivity, which
# makes the first request (e.g. login) hang for ~50s and the app shows a
# "cannot connect to server" notice. This workflow pings the health endpoint
# every 10 minutes so the service stays warm during the day.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 https://alblingo-backend.onrender.com/health || echo "000")
            echo "Attempt $i -> HTTP $code"
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 20
          done
          echo "Backend did not respond with 200 after retries"
          exit 1
